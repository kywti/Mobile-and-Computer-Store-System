<!doctype html>
<html>
  <head>
    <title>Inventory</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>

  <body>
    <div class="user-management-page-bg">
      <p class="top-slogan">B R A N D &emsp;&emsp; S L O G A N</p>

      <header class="header">
        <div class="header-top">
          <p class="logo">LOGO</p>

          <form class="header-search-bar">
            <input placeholder="What are you looking for?" />
            <button class="search-button">
              <img
                class="icon"
                src="../../img/icons/search.png"
                alt="Search icon"
              />
            </button>
          </form>

          <button class="profile-button">
            <img
              class="icon"
              src="../../img/icons/profile.png"
              alt="Profile icon"
            />
          </button>
        </div>

        <nav class="header-bottom">
          <button class="header-button">DASHBOARD</button>
          <button class="header-button active">ORDERS</button>
          <button class="header-button">INVENTORY</button>
          <button class="header-button">CUSTOMERS</button>
        </nav>
      </header>

      <main class="main-area">
        <section class="section-header">
          <h2 class="section-title">Order Management</h2>
        </section>

        <!-- STATS -->
        <section class="stats">
          <div class="stat-box">
            <div class="stat-icon">
              <img
                class="button-icon-admin"
                src="/img/icons/checkout.png"
                alt="New Orders icon"
              />
            </div>
            <p>New Orders</p>
            <h3 id="total-products"></h3>
          </div>

          <div class="stat-box">
            <div class="stat-icon">
              <img
                class="button-icon-admin"
                src="/img/icons/pending.png"
                alt="Pending Orders icon"
              />
            </div>
            <p>Pending Orders</p>
            <h3 id="low-stock"></h3>
          </div>

          <div class="stat-box">
            <div class="stat-icon">
              <img
                class="button-icon-admin"
                src="/img/icons/block.png"
                alt="Cancelled Orders icon"
              />
            </div>
            <p>Cancelled Orders</p>
            <h3 id="out-stock"></h3>
          </div>
        </section>

        <p class="inventory-subtitle">Order List</p>

        <!-- INVENTORY -->
        <section class="inventory">
          <div class="inventory-top">
            <div class="filters">
              <button class="active">All Orders</button>
              <button>Pending</button>
              <button>Processing</button>
              <button>Out For Delivery</button>
              <button>Delivered</button>
              <button>Canceled</button>
            </div>

            <div class="export-wrapper">
              <button class="export-btn">
                <img
                  src="../../img/icons/export-white.png"
                  alt="Export"
                  class="export-icon"
                />
                Export
              </button>
            </div>

            <div class="search-container">
              <input class="search" placeholder="Search products..." />
              <img
                class="search-icon"
                src="../../img/icons/search.png"
                alt="Search icon"
              />
            </div>
          </div>

          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>Product name</th>
                  <th>Client</th>
                  <th>Date</th>
                  <th>Order ID</th>
                  <th>Status</th>
                  <th>Price</th>
                  <th>Action</th>
                </tr>
              </thead>

              <tbody id="order-total-body"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <div class="edit-status-modal" id="editStatusModal">
      <div class="edit-status-content">
        <h4>Update Order Status</h4>

        <select id="orderStatusSelect">
          <option>Pending</option>
          <option>Processing</option>
          <option>Out For Delivery</option>
          <option>Delivered</option>
          <option>Canceled</option>
        </select>

        <div class="modal-buttons">
          <button id="cancelEditStatus">Cancel</button>
          <button id="confirmEditStatus">Update</button>
        </div>
      </div>
    </div>
    <script src="../js/order.js"></script>
    <script src="../js/adminnav.js"></script>
  </body>
</html>
