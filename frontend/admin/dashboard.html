<!doctype html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="../css/client2.css">
</head>

<body>

<div class="inventory-managgement-page-bg">

  <p class="top-slogan">B R A N D &emsp;&emsp; S L O G A N</p>

  <header class="header">

    <div class="header-top">
      <p class="logo">LOGO</p>

      <form class="header-search-bar">
        <input placeholder="What are you looking for?" />
        <button class="search-button">
          <img class="icon" src="../../img/icons/search.png">
        </button>
      </form>

      <button class="profile-button">
        <img class="icon" src="../../img/icons/profile.png">
      </button>
    </div>

    <nav class="header-bottom">
      <button class="header-button active">DASHBOARD</button>
      <button class="header-button">ORDERS</button>
      <button class="header-button">INVENTORY</button>
      <button class="header-button">CUSTOMERS</button>
    </nav>

  </header>

  <main class="main-area">

    <section class="section-header">
      <h2 class="section-title">Dashboard Overview</h2>
    </section>

    <!-- ================= STATS ================= -->
    <section class="stats dashboard-stats">

      <div class="stat-box dashboard-stat">
        <div class="stat-icon">💰</div>
        <p>Total Revenue</p>
        <h3 id="total-revenue">0</h3>
      </div>

      <div class="stat-box dashboard-stat">
        <div class="stat-icon">🛒</div>
        <p>Total Orders</p>
        <h3 id="total-orders">0</h3>
      </div>

      <div class="stat-box dashboard-stat">
        <div class="stat-icon">📦</div>
        <p>Total Products</p>
        <h3 id="total-products">0</h3>
      </div>

      <div class="stat-box dashboard-stat">
        <div class="stat-icon">👤</div>
        <p>Total Users</p>
        <h3 id="total-users">0</h3>
      </div>

    </section>

    <!-- ================= DASHBOARD ROW ================= -->
    <div class="dashboard-row">

      <!-- TOP PRODUCTS -->
      <div class="dashboard-card small-card">
        <h3 class="inventory-subtitle">Top Products</h3>
        <ul class="top-products" id="top-products"></ul>
      </div>

      <!-- SALES CHART -->
      <div class="dashboard-card small-card chart-card">
        <h3 class="inventory-subtitle">Sales By Category</h3>
        <canvas id="chart"></canvas>
      </div>

      <!-- LATEST ORDERS -->
      <div class="dashboard-card big-card">
        <h3 class="inventory-subtitle">Latest Orders</h3>
        <div class="orders-list-inv" id="latest-orders"></div>
      </div>

    </div>

  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../js/dashboard.js"></script>
 <script src="../js/adminnav.js"></script>

</body>
</html>
