<!doctype html>
<html>
  <head>
    <title>Inventory</title>
    <link rel="stylesheet" href="../css/inventory.css" />
  </head>

  <body>
    <div class="inventory-managgement-page-bg">

      <p class="top-slogan">B R A N D &emsp;&emsp; S L O G A N</p>

      <!-- HEADER -->
      <header class="header">

        <div class="header-top">
          <p class="logo">LOGO</p>

          <form class="header-search-bar">
            <input placeholder="What are you looking for?" />
            <button class="search-button">
              <img class="icon" src="../../img/icons/search.png" />
            </button>
          </form>

          <button class="profile-button">
            <img class="icon" src="../../img/icons/profile.png" />
          </button>
        </div>

        <nav class="header-bottom">
          <button class="header-button">DASHBOARD</button>
          <button class="header-button">ORDERS</button>
          <button class="header-button active">INVENTORY</button>
          <button class="header-button">CUSTOMERS</button>
        </nav>

      </header>

      <!-- MAIN -->
      <main class="main-area">

        <section class="section-header">
          <h2 class="section-title">Inventory Management</h2>
        </section>

        <!-- STATS -->
        <section class="stats">
          <div class="stat-box">
            <div class="stat-icon">📦</div>
            <p>Total Products</p>
            <h3 id="total-products">0</h3>
          </div>

          <div class="stat-box">
            <div class="stat-icon">⚠️</div>
            <p>Low Stock</p>
            <h3 id="low-stock">0</h3>
          </div>

          <div class="stat-box">
            <div class="stat-icon">❌</div>
            <p>Out Of Stock</p>
            <h3 id="out-stock">0</h3>
          </div>
        </section>

        <p class="inventory-subtitle">Product Inventory</p>

        <!-- INVENTORY -->
        <section class="inventory">

          <div class="inventory-top">

            <div class="filters">
              <button class="active">All Products</button>
              <button>In Stock</button>
              <button>Low Stock</button>
              <button>Out Of Stock</button>
            </div>

            <div class="search-container">
              <input class="search" placeholder="Search products..." />
              <img class="search-icon" src="../../img/icons/search.png" />
            </div>

          </div>

          <!-- TABLE -->
          <div class="table-container">
            <table>

              <thead>
                <tr>
                  <th></th>
                  <th>Product</th>
                  <th>Category</th>
                  <th>Stock</th>
                  <th>Status</th>
                  <th>Price</th>
                  <th>Supplier</th>
                  <th>Actions</th>
                </tr>
              </thead>

              <!-- ✅ EMPTY (JS WILL FILL IT) -->
              <tbody id="product-table-body"></tbody>

            </table>
          </div>

        </section>

        <!-- ADD BUTTON -->
        <div class="add-btn-container">
          <button class="add-product-btn">+ Add Product</button>
        </div>

      </main>

    </div>

    <!-- ✅ LINK YOUR JS FILE -->
    <script src="../js/inventory.js"></script>

  </body>
</html>
