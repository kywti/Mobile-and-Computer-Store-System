<!doctype html>
<html>
  <head>
    <title>Product Details</title>
    <link rel="stylesheet" href="../css/client.css" />
  </head>
  <body>
    <div class="product-details-page-bg">
      <p class="top-slogan">B R A N D &emsp;&emsp; S L O G A N</p>

      <header class="header">
        <div class="header-top">
          <p class="logo">LOGO</p>

          <form class="header-search-bar">
            <input placeholder="What are you looking for?" />
            <button class="search-button">
              <img class="icon" src="../../img/icons/search.png" />
            </button>
          </form>
          <button class="shopping-cart-button">
            <img class="icon" src="../../img/icons/shopping-cart.png" />
          </button>
          <button class="profile-button">
            <img class="icon" src="../../img/icons/profile.png" />
          </button>
        </div>
        <nav class="header-bottom">
          <button class="header-button home-header-button">Home</button>
          <button class="header-button phones-header-button">Phones</button>
          <button class="header-button laptops-header-button">Laptops</button>
          <button class="header-button tablets-header-button">Tablets</button>
          <button class="header-button accessories-header-button">
            Accessories
          </button>
        </nav>
      </header>
      <main class="main-area">
        <section class="product-details-header">
          <button class="back-button" id="pdp-back-button">Back</button>
          <p class="section-title">Product Details</p>
        </section>
        <article class="pdp-product-details">
          <div class="product-variants">
            <img class="product-image" id="product-image" />
            <div class="variants-images"></div>
          </div>
          <section class="pdp-product-specs">
            <p  id="product-category"></p>
            <p  id="product-rating"></p>
            <p  id="product-name"></p>
            <p id="product-description"></p>
            <p  id="product-price"></p>
            <p></p>
            <div  id="product-colors-button"></div>
            <div class="bottom-buttons">
              <div class="quantity-buttons">
                <button class="edit-quantity pdp-minus">-</button>
                <p class="quantity-display">1</p>
                <button class="edit-quantity pdp-plus">+</button>
              </div>
              <button class="add-to-cart-button">Add to cart</button>
            </div>
            <p>Available at checkout</p>
            <img class="payment-icon" src="../../img/icons/eddahabia.webp" />
          </section>
        </article>
      </main>
      <footer class="bottom-area">
        <div class="bottom-area-text">
          <p class="bottom-area-text-top">About</p>
          <p>About Us</p>
          <p>Careers</p>
          <p>Franchishing</p>
          <p>Brand Blog</p>
          <p>Press</p>
        </div>
        <div class="bottom-area-text">
          <p class="bottom-area-text-top">Support</p>
          <p>Repairs</p>
          <p>Contact Us</p>
          <p>FAQ</p>
        </div>
        <div class="bottom-area-text">
          <p class="bottom-area-text-top">Legal</p>
          <p>Terms and Conditions</p>
          <p>Cookies Policy</p>
          <p>Privacy Policy</p>
        </div>
      </div>
    </footer>

    <script src="../js/product-details.js" defer></script>
    <script src="../js/index.js" defer></script>
    <script src="../js/products.js" defer></script>
    <script src="../js/cart.js" defer></script>
  </body>
</html>
