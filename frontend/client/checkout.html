<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
    <link rel="stylesheet" href="../css/checkout.css">
</head>

<body>
    <div class="home-page-bg">

        <p class="top-slogan">B R A N D &emsp;&emsp; S L O G A N</p>

     <div class="header">

        <div class="header-top">
          <p class="logo">LOGO</p>
          
          <form class="header-search-bar">
            <input />
            <button class="search-button">
              <img class="icon" src="/img/icons/search.png" />
            </button>
          </form>
          <button class="shopping-cart-button">
            <img class="icon" src="/img/icons/shopping-cart.png" />
          </button>
          <button class="profile-button">
            <img class="icon" src="/img/icons/profile.png" />
          </button>
        </div>
        <div class="header-bottom">
          <button class="header-button">Home</button>
          <button class="header-button">Phones</button>
          <button class="header-button">Laptops</button>
          <button class="header-button">Tablets</button>
          <button class="header-button">Accessories</button>
        </div>
      </div>

    <div class="checkout-container">

        <h2 class="section-title">CHECKING OUT</h2>

        <div class="checkout-content">

            <div class="order-summary">

                <h3>Order Summary</h3>

                <div class="product-summary">
                    <img src="/img/products/phone.png">
                    <div>
                        <p>SAMSUNG S23+ FLIP PHONE</p>
                        <span>$234.67</span>
                    </div>
                    <button class="delete-btn">🗑</button>
                </div>

                <div class="product-summary">
                    <img src="/img/products/tablet.png">
                    <div>
                        <p>TABLET THING</p>
                        <span>$234.67</span>
                    </div>
                    <button class="delete-btn">🗑</button>
                </div>

                <div class="total-box">
                    <p>Sub total <span>$254.67</span></p>
                    <p>Shipping Fee <span>FREE</span></p>

                    <div class="total-separator"></div>
                    <h4>Total <span>$254.67</span></h4>
                </div>

            </div>

            
    <div class="checkout-form">

        <div class="main-form-title">Shipping</div>

        <div class="form-section-title">Shipping Details</div>

        <div class="input-group">
            <label>Address</label>
            <input type="text">
        </div>

        <div class="row">
            <div class="input-group">
                <label>City</label>
                <input type="text">
            </div>

            <div class="input-group">
                <label>State</label>
                <input type="text">
            </div>
        </div>

        <div class="input-group">
            <label>Postal Code</label>
            <input type="text">
   

                <h3>Delivery Options</h3>
                <label><input type="radio" name="delivery" checked> Standard 5-7 days (FREE)</label>
                <label><input type="radio" name="delivery"> 2-4 days (+5$)</label>
                <label><input type="radio" name="delivery"> Same day (+15$)</label>

                <h3>Payment Methods</h3>
                <label><input type="radio" name="payment" checked> Pay on delivery</label>
                <label><input type="radio" name="payment"> Online payment (EDAHABIA)</label>

                <button class="continue-btn">CONTINUE</button>

        </div>

        </div>
        <div class="right-separator"></div>
    </div>

    </div>

</body>
</html>
