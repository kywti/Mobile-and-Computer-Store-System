<!doctype html>
<html>
  <head>
    <title>Shopping History</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="shopping-cart-page-bg">
      <p class="top-slogan">B R A N D &emsp;&emsp; S L O G A N</p>

      <header class="header">
        <div class="header-top">
          <p class="logo">LOGO</p>

          <form class="header-search-bar">
            <input placeholder="What are you looking for?" />
            <button class="search-button">
              <img class="icon" src="../../img/icons/search.png" alt="Search icon"/>
            </button>
          </form>
          <button class="shopping-cart-button">
            <img class="icon" src="../../img/icons/shopping-cart.png" alt="Shopping Cart icon"/>
          </button>
          <button class="profile-button">
            <img class="icon" src="../../img/icons/profile.png" alt="Profile icon"/>
          </button>
        </div>
        <nav class="header-bottom">
          <button class="header-button home-header-button">Home</button>
          <button class="header-button phones-header-button">Phones</button>
          <button class="header-button laptops-header-button">Laptops</button>
          <button class="header-button tablets-header-button">Tablets</button>
          <button class="header-button accessories-header-button"> Accessories</button>
        </nav>
      </header>

      <main class="main-area">
        <div class="basket-header">
          <p class="p1">Your Basket</p>
          <p class="p2">2 item(s)</p>
        </div>

        <section class="sc-elements">
          <aside class="left-container">
            <img class="sc-left-ad" src="../../img/ads/ad-7.webp" alt="Ad"/>
            <img class="sc-left-ad" src="../../img/ads/ad-15.webp" alt="Ad"/>
            <img class="sc-left-ad" src="../../img/ads/ad-16.webp" alt="Ad"/>
            <img class="sc-left-ad" src="../../img/ads/ad-17.webp" alt="Ad"/>
        </aside>
          <section class="basket"></section>
          <section class="right-container">
            <section class="order-summary">
              <p class="order-summary-label">ORDER SUMMARY</p>
              <p class="order-summary-separator">
                ----------------------------
              </p>
              <div class="order-price-container">
                <p>Sub total</p>
                <p class="total-price">DZD 0</p>
              </div>
            </section>
            <button class="checkout-button">PROCEED TO CHECKOUT</button>
            <div class="sc-right-ad">
              <img src="../../img/ads/ad-8.webp" alt="Ad"/>
            </div>
          </aside>
        </section>
      </main>
      <footer class="bottom-area">
        <div class="bottom-area-text">
          <p class="bottom-area-text-top">About</p>
          <p>About Us</p>
          <p>Careers</p>
          <p>Franchishing</p>
          <p>Brand Blog</p>
          <p>Press</p>
        </div>
        <div class="bottom-area-text">
          <p class="bottom-area-text-top">Support</p>
          <p>Repairs</p>
          <p>Contact Us</p>
          <p>FAQ</p>
        </div>
        <div class="bottom-area-text">
          <p class="bottom-area-text-top">Legal</p>
          <p>Terms and Conditions</p>
          <p>Cookies Policy</p>
          <p>Privacy Policy</p>
        </div>
      </div>
      </footer>

    <script src="../js/auth.js" defer></script>
    <script src="../js/guards.js" defer></script>
    <script src="../js/index.js" defer></script>
    <script src="../js/products.js" defer></script>
    <script src="../js/cart.js" defer></script>
    <script src="../js/shopping-cart.js" defer></script>
    >
  </body>
</html>
