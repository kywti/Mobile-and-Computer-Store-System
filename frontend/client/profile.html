<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile</title>
  <link rel="stylesheet" href="../css/profile.css">
</head>
<body class="home-page-bg">

  <!-- TOP SLOGAN -->
  <p class="top-slogan">SOME INSPIRING TEXT</p>

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <p class="logo">LOGO</p>

      <div class="header-search-bar">
        <input placeholder="What are you looking for ?">
      </div>

      <button class="icon-btn">
        <img src="/img/icons/profile.png" class="icon">
      </button>

      <button class="icon-btn">
        <img src="/img/icons/shopping-cart.png" class="icon">
      </button>
    </div>

    <div class="header-bottom">
      <button class="header-button">HOME</button>
      <button class="header-button">PHONES</button>
      <button class="header-button">LAPTOPS</button>
      <button class="header-button">TABLETS</button>
      <button class="header-button">ACCESSORIES</button>
    </div>
  </div>

  <!-- WHITE CARD -->
  <div class="white-card profile-card">

    <h2>PROFILE</h2>

    <div class="profile-img-box">
      <img src="/img/profile.png" class="profile-img">
    </div>

    <h3>YOUR INFORMATION</h3>

    <div class="row">
      <input placeholder="First Name">
      <input placeholder="Last Name">
    </div>

    <button class="small-btn">Change username</button>

    <input class="full-input" placeholder="EMAIL@EMAIL.COM">
    <button class="small-btn">Change email address</button>

    <input class="full-input" type="password" value="*************">
    <button class="small-btn">Change password</button>

    <button class="action-btn">Check order history</button>
    <button class="action-btn">LOG OUT</button>

  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="bottom-area">

      <div class="bottom-area-text">
        <p class="bottom-area-text-top">About</p>
        <p>About Us</p>
        <p>Careers</p>
        <p>Franchising</p>
        <p>Brand Blog</p>
        <p>Press</p>
      </div>

      <div class="bottom-area-text">
        <p class="bottom-area-text-top">Support</p>
        <p>Repairs</p>
        <p>Contact Us</p>
        <p>FAQ</p>
      </div>

      <div class="bottom-area-text">
        <p class="bottom-area-text-top">Legal</p>
        <p>Terms and Conditions</p>
        <p>Cookies Policy</p>
        <p>Privacy Policy</p>
      </div>

    </div>
  </div>

</body>
</html>
