<!DOCTYPE html>
<html>
  <head>
    <title>Profile</title>
    <link rel="stylesheet" href="../css/profile.css" />
  </head>
  <body>
    <div class="product-details-page-bg">
      <p class="top-slogan">B R A N D &emsp;&emsp; S L O G A N</p>

      <div class="header">
        <div class="header-top">
          <p class="logo">LOGO</p>
          <form class="header-search-bar">
            <input placeholder="What are you looking for?" />
            <button class="search-button">
              <img class="icon" src="/img/icons/search.png" />
            </button>
          </form>
          <button class="shopping-cart-button">
            <img class="icon" src="/img/icons/shopping-cart.png" />
          </button>
          <button class="profile-button">
            <img class="icon" src="/img/icons/profile.png" />
          </button>
        </div>
        <div class="header-bottom">
          <button class="header-button">Home</button>
          <button class="header-button">Phones</button>
          <button class="header-button">Laptops</button>
          <button class="header-button">Tablets</button>
          <button class="header-button">Accessories</button>
        </div>
      </div>

      <div class="main-area">
        <div class="pdp-product-details profile-content">
          
          <h2 class="section-title">PROFILE</h2>

          <!-- PROFILE PHOTO -->
          <div class="profile-img-box">
            <img src="/img/icons/client-pfp.jpg" class="profile-img" alt="Profile photo" onerror="this.src='/img/icons/profile.png'">
          </div>

          <h3>YOUR INFORMATION</h3>

          <div class="info-row">
            <div class="info-box">
              <span class="info-label">First Name</span>
              <span id="firstName" class="info-value">John</span>
            </div>
            <div class="info-box">
              <span class="info-label">Last Name</span>
              <span id="lastName" class="info-value">Doe</span>
            </div>
          </div>
          <button class="small-btn">Change username</button>

          <div class="info-row full-width">
            <div class="info-box full-width">
              <span class="info-label">Email</span>
              <span id="email" class="info-value">john@email.com</span>
            </div>
          </div>
          <button class="small-btn">Change email address</button>

          <div class="info-row full-width">
            <div class="info-box full-width">
              <span class="info-label">Password</span>
              <span class="info-value">*************</span>
            </div>
          </div>
          <button class="small-btn">Change password</button>

          <div class="centered-action-buttons">
            <button class="action-btn" onclick="goToOrderHistory()">Check order history</button>
            <button class="action-btn" onclick="logout()">LOG OUT</button>
          </div>

        </div>
      </div>

      <div class="bottom-area">
        <div class="bottom-area-text">
          <p class="bottom-area-text-top">About</p>
          <p>About Us</p>
          <p>Careers</p>
          <p>Franchising</p>
          <p>Brand Blog</p>
          <p>Press</p>
        </div>
        <div class="bottom-area-text">
          <p class="bottom-area-text-top">Support</p>
          <p>Repairs</p>
          <p>Contact Us</p>
          <p>FAQ</p>
        </div>
        <div class="bottom-area-text">
          <p class="bottom-area-text-top">Legal</p>
          <p>Terms and Conditions</p>
          <p>Cookies Policy</p>
          <p>Privacy Policy</p>
        </div>
      </div>
    </div>

    <script src="../js/profile.js" defer></script>
  </body>
</html>
