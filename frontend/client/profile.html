<!DOCTYPE html>
<html>
  <head>
    <title>Profile</title>
    <link rel="stylesheet" href="../css/profile.css" />
  </head>
  <body>
    <div class="product-details-page-bg">
      <p class="top-slogan">B R A N D &emsp;&emsp; S L O G A N</p>

      <!-- HEADER - IDENTICAL -->
      <div class="header">
        <div class="header-top">
          <p class="logo">LOGO</p>
          <form class="header-search-bar">
            <input placeholder="What are you looking for?" />
            <button class="search-button">
              <img class="icon" src="/img/icons/search.png" />
            </button>
          </form>
          <button class="shopping-cart-button">
            <img class="icon" src="/img/icons/shopping-cart.png" />
          </button>
          <button class="profile-button">
            <img class="icon" src="/img/icons/profile.png" />
          </button>
        </div>
        <div class="header-bottom">
          <button class="header-button">Home</button>
          <button class="header-button">Phones</button>
          <button class="header-button">Laptops</button>
          <button class="header-button">Tablets</button>
          <button class="header-button">Accessories</button>
        </div>
      </div>

      <!-- MAIN AREA - IDENTICAL STRUCTURE -->
      <div class="main-area">
        <div class="pdp-product-details profile-content">
          
          <!-- Profile Content Here -->
          <div class="profile-section">
            <h2>PROFILE</h2>
            
            <div class="profile-img-box">
              <img src="/img/icons/profile.png" class="profile-img">
            </div>

            <h3>YOUR INFORMATION</h3>

            <div class="row">
              <input placeholder="First Name">
              <input placeholder="Last Name">
            </div>

            <button class="small-btn">Change username</button>

            <input class="full-input" placeholder="EMAIL@EMAIL.COM">
            <button class="small-btn">Change email address</button>

            <input class="full-input" type="password" value="*************">
            <button class="small-btn">Change password</button>

            <button class="action-btn">Check order history</button>
            <button class="action-btn">LOG OUT</button>
          </div>

        </div>
      </div>

      <!-- BOTTOM AREA - IDENTICAL -->
      <div class="bottom-area">
        <div class="bottom-area-text">
          <p class="bottom-area-text-top">About</p>
          <p>About Us</p>
          <p>Careers</p>
          <p>Franchising</p>
          <p>Brand Blog</p>
          <p>Press</p>
        </div>
        <div class="bottom-area-text">
          <p class="bottom-area-text-top">Support</p>
          <p>Repairs</p>
          <p>Contact Us</p>
          <p>FAQ</p>
        </div>
        <div class="bottom-area-text">
          <p class="bottom-area-text-top">Legal</p>
          <p>Terms and Conditions</p>
          <p>Cookies Policy</p>
          <p>Privacy Policy</p>
        </div>
      </div>
    </div>

    <script src="../js/index.js" defer></script>
  </body>
</html>
