<!doctype html>
<html>
  <head>
    <title>Products</title>
    <link rel="stylesheet" href="../css/client.css" />
  </head>
  <body>
    <div class="product-page-bg">
      <p class="top-slogan">T E S T</p>

      <header class="header">
        <div class="header-top">
          <p class="logo">LOGO</p>

          <form class="header-search-bar">
            <input id="headerSearch" placeholder="What are you looking for?" />
            <button class="search-button">
              <img class="icon" src="../../img/icons/search.png" alt="Search icon"/>
            </button>
          </form>
          <button class="shopping-cart-button">
            <img class="icon" src="../../img/icons/shopping-cart.png" alt="Shopping Cart icon"/>
          </button>
          <button class="profile-button">
            <img class="icon" src="../../img/icons/profile.png" alt="Profile icon"/>
          </button>
        </div>
        <nav class="header-bottom">
          <button class="header-button home-header-button">Home</button>
          <button class="header-button phones-header-button">Phones</button>
          <button class="header-button laptops-header-button">Laptops</button>
          <button class="header-button tablets-header-button">Tablets</button>
          <button class="header-button accessories-header-button">
            Accessories
          </button>
        </nav>
      </header>
      <main class="main-area">
        <section class="products-area">
          <section class="p-products-header">
            <div class="p-filler"></div>
            <p class="section-title products-title">ALL PRODUCTS</p>
            <form class="oh-sort-search-bar">
            
              <select id="brandFilter">
                <option value="">All brands</option>
                <option value="alcatel">Alcatel</option>
                <option value="apple">Apple</option>
                <option value="asus">Asus</option>
                <option value="danger">Danger</option>
                <option value="dell">Dell</option>
                <option value="hp">HP</option>
                <option value="htc">HTC</option>
                <option value="mitac">MiTAC</option>
                <option value="motorola">Motorola</option>
                <option value="nokia">Nokia</option>
                <option value="palm">Palm</option>
                <option value="samsung">Samsung</option>
                <option value="sanyo">Sanyo</option>
                <option value="sony">Sony</option>
              </select>
              <select id="priceFilter">
                <option value="">All Prices</option>
                <option value="0-5000">Under 5,000</option>
                <option value="5000-20000">5,000 - 20,000</option>
                <option value="20000-50000">20,000 - 50,000</option>
                <option value="50000+">50,000+</option>
              </select>
              <button id="filterBtn" class="sort-button">
                <img class="icon" src="../../img/icons/filter.png" alt="Filter icon"/>
              </button>
            </form>
          </section>
          

          <section class="products-grid"></section>
        </section>
      </main>
      <footer class="bottom-area">
        <div class="bottom-area-text">
          <p class="bottom-area-text-top">About</p>
          <p>About Us</p>
          <p>Careers</p>
          <p>Franchishing</p>
          <p>Brand Blog</p>
          <p>Press</p>
        </div>
        <div class="bottom-area-text">
          <p class="bottom-area-text-top">Support</p>
          <p>Repairs</p>
          <p>Contact Us</p>
          <p>FAQ</p>
        </div>
        <div class="bottom-area-text">
          <p class="bottom-area-text-top">Legal</p>
          <p>Terms and Conditions</p>
          <p>Cookies Policy</p>
          <p>Privacy Policy</p>
        </div>
      </div>
    </footer>
    <script src="../js/auth.js" defer></script>
    <script src="../js/guards.js" defer></script>
    <script src="../js/index.js" defer></script>
    <script src="../js/products.js" defer></script>
  </body>
</html>
