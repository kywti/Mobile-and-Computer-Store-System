<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="container">
    <div class="form-box">

        <h1>LOGO BRAND</h1>

        <h2>Create an account</h2>
        <p class="top-text">
            Already have an account? <a href="signin.html">Login</a>
        </p>

        <form>

            <!-- Name -->
            <div class="row">
                <div class="input-group">
                    <label>First Name</label>
                    <input type="text">
                </div>

                <div class="input-group">
                    <label>Last Name</label>
                    <input type="text">
                </div>
            </div>

            <!-- Email -->
            <div class="input-group">
                <label>Email Address</label>
                <input type="email">
            </div>

            <!-- Password -->
           
            <div class="input-group password-group">
                <label>Password</label>

                <div class="password-wrapper">
                    <input type="password" id="password">
                    <span class="toggle-password" onclick="togglePassword()">👁</span>
                 </div>
            </div>

            <!-- Phone -->
            <div class="input-group">
                <label>Phone Number</label>
                <input type="text" placeholder="+213">
            </div>

            <!-- Checkboxes -->
            <div class="checkbox-group">
                <label class="checkbox">
                    <input type="checkbox">
                    <span>Keep me updated by email with the latest news.</span>
                </label>

                <label class="checkbox">
                    <input type="checkbox">
                    <span>Keep me updated by SMS with the latest news.</span>
                </label>

                <label class="checkbox">
                    <input type="checkbox">
                    <span>
                        I accept the 
                        <a href="#">Terms & Conditions</a> and 
                        <a href="#">Privacy Policy</a>
                    </span>
                </label>
            </div>

            <button type="submit">SIGN UP</button>

        </form>
    </div>
</div>
<script>
    
function togglePassword() {
    const password = document.getElementById("password");
    const icon = document.querySelector(".toggle-password");

    if (password.type === "password") {
        password.type = "text";
        icon.textContent = "🙈"; // hide mode
    } else {
        password.type = "password";
        icon.textContent = "👁"; // show mode
    }
}
</script>
</body>
</html>
