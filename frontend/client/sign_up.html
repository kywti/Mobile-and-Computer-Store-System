<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sign Up</title>
    <link rel="stylesheet" href="../css/client.css" />
  </head>
  <body class="auth-page">
    <main class="auth-container">
      <section class="auth-box">
        <h1 class="logo-brand">LOGO BRAND</h1>
        <h2>Create an account</h2>
        <p class="top-text">
          Already have an account? <a href="sign_in.html">Login</a>
        </p>

        <form>
          <div class="row">
            <div class="input-group-ww">
              <label>First Name</label>
              <input id="firstName" type="text" />
            </div>
            <div class="input-group-ww">
              <label>Last Name</label>
              <input id="lastName" type="text" />
            </div>
          </div>

          <div class="input-group-ww">
            <label>Email Address</label>
            <input id="email" type="email" />
          </div>

          <div class="input-group-ww">
            <label>Password</label>
            <div class="password-wrapper">
              <input id="password" type="password" id="password" />
            </div>
          </div>

          <div class="input-group-ww">
            <label>Phone Number</label>
            <input type="text" placeholder="+213" />
          </div>

          <div class="checkbox-group">
            <label class="checkbox">
              <input type="checkbox" />
              <span>Keep me updated by email with the latest news.</span>
            </label>
            <label class="checkbox">
              <input type="checkbox" />
              <span>Keep me updated by SMS with the latest news.</span>
            </label>
            <label class="checkbox">
              <input type="checkbox" />
              <span>
                I accept the
                <a href="#">Terms & Conditions</a> and
                <a href="#">Privacy Policy</a>
              </span>
            </label>
          </div>

          <button type="submit">SIGN UP</button>
        </form>
      </section>
    </main>
    <script src="../js/auth.js" defer></script>
    <script src="../js/guards.js" defer></script>
  </body>
</html>
